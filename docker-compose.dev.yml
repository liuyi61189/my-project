name: testhub-dev

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testhub_dev}
      MYSQL_USER: ${MYSQL_USER:-testhub_dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - dev-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - dev-net
    ports:
      - "127.0.0.1:${DEV_MYSQL_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-testhub_dev}", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 10s
      retries: 20
    mem_limit: 1g
    cpus: 1.0

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - dev-redis-data:/data
    networks:
      - dev-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    cpus: 0.5

  backend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps:/app/apps
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - ./manage.py:/app/manage.py
      - ./docker_start.py:/app/docker_start.py
      - dev-media:/app/media
      - dev-logs:/app/logs
      - dev-knowledge:/app/knowledge-bases
      - dev-chroma:/app/chroma
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${DEV_BACKEND_PORT:-18000}:8000"
    mem_limit: 4g
    cpus: 2.0

  frontend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - dev-net
    ports:
      - "${DEV_FRONTEND_PORT:-18080}:80"
    mem_limit: 256m
    cpus: 0.5

networks:
  dev-net:
    driver: bridge

volumes:
  dev-mysql-data:
  dev-redis-data:
  dev-media:
  dev-logs:
  dev-knowledge:
  dev-chroma:
